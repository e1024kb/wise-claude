name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml python-ulid typing_extensions pytest ruff

      # §6.2 Syntax and structural checks (CONTRIBUTING.md) — copied
      # verbatim so CI is the single enforcement of the documented gate.
      - name: JSON manifests parse
        run: |
          python3 -m json.tool .claude-plugin/marketplace.json > /dev/null
          python3 -m json.tool harnesses/claude/wise/.claude-plugin/plugin.json > /dev/null

      - name: Bash scripts parse
        run: bash -n harnesses/claude/wise/scripts/*.sh

      - name: Python scripts compile
        run: python3 -m py_compile harnesses/claude/wise/scripts/*.py core/scripts/*.py scripts/validate_repo.py

      - name: No stale /wise:* name references
        run: |
          # Excludes matches that are themselves quoting this exact grep
          # invocation (CONTRIBUTING.md §6.2's own documented command, and
          # docs/plans/ prose describing it) — those aren't stale skill
          # references, they're the check's own literal search pattern.
          if grep -Rn "/wise:old-name" harnesses/ core/ docs/ README.md CONTRIBUTING.md \
              | grep -vF 'grep -Rn "/wise:old-name"'; then
            echo "::error::stale /wise:old-name reference found"
            exit 1
          fi
          echo "clean"

      - name: Repo validation harness
        run: python3 scripts/validate_repo.py

      - name: Pytest
        run: python3 -m pytest harnesses/claude/wise/tests -q || [ $? -eq 5 ]

      - name: Shellcheck (non-blocking)
        continue-on-error: true
        run: shellcheck harnesses/claude/wise/scripts/*.sh harnesses/claude/wise/hooks/*.sh

      - name: Ruff (non-blocking)
        continue-on-error: true
        run: ruff check harnesses/claude/wise/scripts core/scripts scripts

      # CONTRIBUTING.md §8: a change under harnesses/ or core/ (the
      # canonical source + every port) must bump the single version
      # source, harnesses/claude/wise/.claude-plugin/plugin.json, in the
      # same PR.
      - name: Version-bump check
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          # fetch-depth: 0 fetches all branches, but ensure the base
          # ref is present regardless in case checkout ever changes.
          git fetch --quiet origin "${BASE_REF}"
          changed="$(git diff --name-only "origin/${BASE_REF}...HEAD")"
          # Changes under harnesses/ or core/, excluding doc-only .md at a
          # port's plugin root (README/CLAUDE/AGENTS.md — a nested dir's
          # .md, e.g. workflows/*/README.md, still counts).
          watched="$(printf '%s\n' "$changed" | grep -E '^(harnesses/|core/)' | grep -v -E '^harnesses/[^/]+/wise/[^/]*\.md$' || true)"
          if [ -n "$watched" ] && ! printf '%s\n' "$changed" | grep -q '^harnesses/claude/wise/\.claude-plugin/plugin\.json$'; then
            echo "::error::harnesses/ or core/ changed but harnesses/claude/wise/.claude-plugin/plugin.json was not bumped — see CONTRIBUTING.md §8"
            exit 1
          fi
