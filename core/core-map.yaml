# core-map.yaml — see CONTRIBUTING.md §10. Generated entries kept
# in sync by hand; edit core/ first, then propagate to each port.
# mode: verbatim (byte-diffed) | adapted (path/frontmatter rewrites, skipped).

version: 1
mappings:
- core: references/
  vendored:
  - harness: claude
    path: harnesses/claude/wise/references/
    mode: verbatim
  - harness: codex
    path: harnesses/codex/wise/references/
    mode: adapted
  - harness: cursor
    path: harnesses/cursor/wise/references/
    mode: adapted
  - harness: hermes
    path: harnesses/hermes/wise/references/
    mode: adapted
- core: workflows/
  vendored:
  - harness: claude
    path: harnesses/claude/wise/workflows/
    mode: verbatim
    exclude:
    - '**/README.md'
  - harness: codex
    path: harnesses/codex/wise/workflows/
    mode: adapted
  - harness: cursor
    path: harnesses/cursor/wise/workflows/
    mode: adapted
  - harness: hermes
    path: harnesses/hermes/wise/workflows/
    mode: adapted
- core: scripts/workflows.py
  vendored:
  - harness: claude
    path: harnesses/claude/wise/scripts/workflows.py
    mode: verbatim
  - harness: codex
    path: harnesses/codex/wise/scripts/workflows.py
    mode: verbatim
  - harness: cursor
    path: harnesses/cursor/wise/scripts/workflows.py
    mode: verbatim
  - harness: hermes
    path: harnesses/hermes/wise/scripts/workflows.py
    mode: verbatim
- core: scripts/engine.py
  vendored:
  - harness: claude
    path: harnesses/claude/wise/scripts/engine.py
    mode: verbatim
  - harness: codex
    path: harnesses/codex/wise/scripts/engine.py
    mode: verbatim
  - harness: cursor
    path: harnesses/cursor/wise/scripts/engine.py
    mode: verbatim
  - harness: hermes
    path: harnesses/hermes/wise/scripts/engine.py
    mode: verbatim
- core: scripts/engine.sh
  vendored:
  - harness: claude
    path: harnesses/claude/wise/scripts/engine.sh
    mode: verbatim
  - harness: codex
    path: harnesses/codex/wise/scripts/engine.sh
    mode: verbatim
  - harness: cursor
    path: harnesses/cursor/wise/scripts/engine.sh
    mode: verbatim
  - harness: hermes
    path: harnesses/hermes/wise/scripts/engine.sh
    mode: verbatim
- core: agents/
  vendored:
  - harness: claude
    path: harnesses/claude/wise/agents/
    mode: adapted
  - harness: codex
    path: harnesses/codex/wise/agents/
    mode: verbatim
  - harness: cursor
    path: harnesses/cursor/wise/agents/
    mode: verbatim
  - harness: hermes
    path: harnesses/hermes/wise/agents/
    mode: verbatim
