# Harness profile — Claude Code (the reference implementation).
#
# The Claude port's skills/ are the canonical source and are NOT
# generated. What IS generated for this port: references/, workflows/
# (byte-copy from core, with the workflow-README doc links re-based one
# directory deeper), scripts/ engine trio (byte-copy from core), and
# agents/ (core role cards + the Claude-specific frontmatter lines
# below, inserted before the closing `---`).
