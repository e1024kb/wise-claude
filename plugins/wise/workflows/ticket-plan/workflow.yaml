version: 1
name: ticket-plan
description: Tracker ticket → parallel research → autonomous consolidated plan → review → setup

author: e1024kb

project-selection: current

# ticket-plan investigates a ticket with a parallel research wave, then
# the conductor CONSOLIDATES the findings and makes the scope / approach /
# component / design / testing decisions AUTONOMOUSLY (no question-by-
# question wizard), writes a PLAN-<ref>.md into the run directory, and
# presents it for the user to review and comment. ONLY AFTER the plan is
# settled does it ask the git / session SETUP questions — as one composite
# questionnaire. Pinned to wave-sync because the review `ask`, the optional
# refine, and the composite `setup` questionnaire all need AskUserQuestion
# (synchronous mode would auto-skip them).
#
# rename_session: skip — the pre-flight rename prompt is wasted here: at
# that point only the run ULID is known, not the <ticket-ref>_ticket-plan
# label. The rename is folded into the composite `setup` questionnaire.
#
# No `requires:` block — tracker-agnostic; `ensure-access` probes for a
# tracker MCP / CLI at run time and proposes install options when none is
# found, rather than declaring a fixed tracker plugin up front.
preflight:
  control-mode:   wave-sync
  rename_session: skip

inputs:
  - name: ticket_id
    prompt: "Which ticket? (paste a URL, or an id like PROJ-123 / ENG-45 / #678)"

steps:
  - id: detect-context
    type: prompt
    prompt: |
      Identify which task-tracking system the input `{{ticket_id}}`
      points at, and capture the current git branch (no questions, no
      branch creation — this is detection only).

      If `{{ticket_id}}` is a URL, match the host:
        • *.atlassian.net/browse/, jira.*   → Jira
        • linear.app/*/issue/               → Linear
        • github.com/*/issues/              → GitHub Issues
        • gitlab.com/*/-/issues/            → GitLab Issues
        • app.asana.com/*                   → Asana
        • *.monday.com / trello.com/c/ / *.shortcut.com / *.notion.so
          / dev.azure.com/*/_workitems/     → Monday / Trello / Shortcut / Notion / Azure Boards
      If the host matches nothing, run a WebSearch to classify it.
      If it is a bare id, infer the most likely tracker from the id
      shape (the `ensure-access` step confirms with the user if it is
      ambiguous).

      Derive a short lowercase tracker slug (jira | linear | gh |
      gitlab | asana | …) and the bare ticket ref.

      Then read the current branch:

        git -C "{{project.path}}" rev-parse --abbrev-ref HEAD

      Report it verbatim as `branch=<name>` so the later `setup` step can
      compare it against the ticket branch and skip the branch question
      when they already match. Do NOT create or switch any branch here.

      Your response's FINAL line MUST be exactly, on its own line:

        DETECT: tracker=<slug> ref=<ticket-ref> branch=<current-branch>
    until: 'DETECT: tracker=(\S+) ref=(\S+) branch=(\S+)'
    max_iterations: 2
    outputs: [tracker_slug, ticket_ref, current_branch]
    depends_on: []

  - id: ensure-access
    type: interactive
    prompt: |
      Confirm this session can reach the **{{tracker_slug}}** tracker
      before fetching ticket `{{ticket_ref}}`.

      Probe for an integration: a tracker MCP, or a CLI (`command -v
      gh`, `command -v glab`, etc.). MCP tools are not pre-granted —
      a one-time permission prompt on first use is expected.

      - If an MCP or CLI is available → reply `ACCESS: ok`.
      - If nothing is available → run a WebSearch for
        "{{tracker_slug}} Claude Code MCP server" and
        "{{tracker_slug}} CLI", then use `AskUserQuestion` to offer:
        one option per researched install path (exact command in the
        description, marked as an unverified suggestion), a
        `Paste the ticket manually` option, and `Abort`. After an
        out-of-band install, re-probe. When access works (or the user
        chose manual paste), reply `ACCESS: ok`; on abort reply
        `ACCESS: abort`.

      FINAL line MUST be exactly: `ACCESS: ok` or `ACCESS: abort`.
    until: 'ACCESS: (ok|abort)'
    depends_on: [detect-context]

  - id: fetch-ticket
    type: prompt
    prompt: |
      Fetch ticket `{{ticket_ref}}` from the {{tracker_slug}} tracker
      using whatever access `ensure-access` established (the tracker's
      MCP, its CLI, or the user's manual paste).

      Normalise the result into this tracker-agnostic shape — omit any
      field the tracker does not have rather than faking it:

        ## Ticket {{tracker_slug}}:{{ticket_ref}} — <Title>
        - Status / Priority / Assignee / Labels / Iteration / Parent (if present)
        ### Description
        ### Acceptance Criteria   (or "none stated")
        ### Related items   — linked tickets / sub-issues / blockers, each with its relation
        ### Design links    — Figma / Sketch / image-attachment URLs
        ### Reference docs  — Confluence / Notion / wiki / doc URLs

      Then classify the ticket: combine the project kind (infer from
      `{{project.path}}` contents — `go.mod`/`pom.xml` → backend,
      `package.json` with React/Vue/Svelte → frontend, both →
      fullstack) with the ticket's own vocabulary, and state a
      `Ticket type:` line of `frontend | backend | fullstack | other`.

      If the fetch fails, stop and surface the error — do NOT invent a
      summary.
    depends_on: [ensure-access]

  - id: analyze-design
    type: prompt
    prompt: |
      For each design link surfaced by `fetch-ticket` (Figma, Sketch,
      Penpot, image attachments, …), produce a design-spec summary:
      per screen / component / frame, summarise layout, typography,
      color (by role), states, responsive behaviour, and assets — as
      plain descriptive values, with NO assumption of a theme file,
      token system, or UI framework.

      Read each link via a design-tool MCP if one is available, else
      `WebFetch` the URL, else note which links could not be opened.

      End with an "Open questions" list for anything ambiguous.

      If `fetch-ticket` classified the ticket as `backend`, or there
      were no design links, reply with exactly `NO-DESIGN`.
    depends_on: [fetch-ticket]

  - id: analyze-related
    type: prompt
    prompt: |
      For every related item (linked ticket / sub-issue / blocker /
      parent) and every reference-doc URL surfaced by `fetch-ticket`,
      fetch full context: related items via the same tracker access
      `ensure-access` established, reference docs via a matching MCP
      or `WebFetch`.

      Produce one markdown section per source with a one-paragraph
      summary:
        ### Related — <tracker>:<ref>: <title> (<relation>)
        ### Reference doc — <title>

      If nothing could be fetched, reply `NO-RELATED`.
    depends_on: [fetch-ticket]

  - id: codebase-audit
    type: prompt
    prompt: |
      Run a reuse-first codebase audit against `{{project.path}}`,
      routed by the ticket type `fetch-ticket` determined.

      First discover the project's actual layout — read its manifest
      (`package.json`, `go.mod`, `pyproject.toml`, `pom.xml`, …) and
      locate the source roots that exist. Then audit:
        • frontend / fullstack → UI components, hooks / stores /
          data-fetching, styling, client state & routing.
        • backend / fullstack → API handlers / routes / resolvers,
          data models & migrations, services, shared utilities.
        • other → the source roots generally.
      In all cases also look for similar implementations.

      For each asset: file path, line number, description, usable
      as-is vs. needs extension.

      Output five markdown sections:
        ### Components / modules to reuse
        ### Hooks / services / data access to reuse
        ### Helpers & utilities
        ### Similar implementations
        ### Nothing found for (needs new implementation)
    depends_on: [fetch-ticket]

  - id: build-plan
    type: prompt
    prompt: |
      You are the Lead Architect. Consolidate the outputs of
      `analyze-design`, `analyze-related`, and `codebase-audit` into a
      single investigation, then make — AUTONOMOUSLY, with a one-line
      rationale each — every decision the work needs: scope &
      requirement clarifications, technical approach (reuse vs extend vs
      build-new for each functional piece, grounded in the audit),
      component & file choices, design-spec decisions (frontend /
      fullstack with designs only), and testing scope. Do NOT ask the
      user anything here — this is the autonomous consolidated decision
      the user reviews next.

      Write the plan to a file. First ensure the directory exists, then
      write with the `Write` tool:

        mkdir -p "{{run.dir}}/plans"
        # file: {{run.dir}}/plans/PLAN-<ref>.md
        # where <ref> is {{ticket_ref}} with any leading '#' stripped
        # (e.g. PLAN-PROJ-777.md, PLAN-678.md)

      Plan structure:

        # {{tracker_slug}}:{{ticket_ref}} — <Title>
        ## Summary
        ## Assumptions
        ## Decisions Made     (each decision + one-line rationale)
        ## Design Notes       (per-component layout / states; include
          only for a frontend / fullstack ticket with designs)
        ## Tasks              (grouped into parallelizable WAVES; each
          task notes "Reuse: …" or "New: …" with file paths, and a per-
          task SP; include the summed total SP)
        ## Testing
        ## Validation         (type-check / lint / tests checklist; add a
          visual-match item for a frontend ticket with designs)

      For SP estimation consult the `wise-estimation` reference skill
      (Fibonacci scale; scope / complexity / uncertainty axes;
      decompose so every task ≤ 3 SP; round the summed total to the
      nearest Fibonacci).

      Your response's FINAL line MUST be exactly, on its own line, the
      absolute path you wrote:

        PLAN: path={{run.dir}}/plans/PLAN-<ref>.md
    until: 'PLAN: path=(\S+)'
    outputs: [plan_path]
    depends_on:
      - analyze-design
      - analyze-related
      - codebase-audit

  - id: present-plan
    type: prompt
    prompt: |
      Read the plan at `{{plan_path}}` and present it to the user for
      review — informational only, no decisions, no questions. Show:

        Plan file: {{plan_path}}

      then, rendered from the file, the **## Summary**, **## Design
      Notes** (skip if absent), **## Decisions Made**, **## Testing**,
      and **## Validation** sections. Tell the user they can comment to
      adjust the plan in the next step, or accept it as-is.
    depends_on: [build-plan]

  - id: review-comments
    type: ask
    question: |
      You've reviewed the plan at {{plan_path}}. Any comments or
      adjustments before we set up the branch? For example: a decision
      to change, a missed constraint, libraries to avoid, files to stay
      out of, or extra acceptance criteria. Skip to accept the plan
      as-is.
    header: "Review"
    output: user_comments
    skip_label: "Accept the plan as-is"
    depends_on: [present-plan]

  - id: refine-plan
    type: prompt
    when: "user_comments != ''"
    prompt: |
      The user reviewed the plan at `{{plan_path}}` and asked for
      changes:

      ---
      {{user_comments}}
      ---

      Re-read the plan, fold these comments in (adjust the affected
      Decisions / Tasks / Testing / Validation sections), and OVERWRITE
      `{{plan_path}}` with the revised plan — same section structure,
      same heading. Then give the user a 2-4 line summary of what
      changed. One revision pass only.
    depends_on: [review-comments]

  - id: setup
    type: interactive
    prompt: |
      The plan is settled. Now collect the git / session SETUP choices
      in ONE composite `AskUserQuestion` call, then act on them. This
      runs in the main TUI (full Bash + AskUserQuestion).

      First compute the target branch from `{{ticket_ref}}` per
      `${CLAUDE_PLUGIN_ROOT}/references/branch-naming.md` — the branch is
      the ticket ref EXACTLY, no prefix:
        • acronym ref (^[A-Za-z]+-\d+$, e.g. PROJ-777) → use verbatim;
        • bare number (^#?\d+$, e.g. #678) → `abstract-task-<digits>`;
        • never add ticket/ jira/ linear/ feat/ wise/ or any `/`.
      Call this `target_branch`. Read the current branch
      (`{{current_branch}}`).

      Build the composite questionnaire — include only the questions
      that apply:
        1. Ticket (always): "Extracted `{{ticket_ref}}` — use this, or
           provide a different ref?" Default = `{{ticket_ref}}`.
        2. Branch (ONLY if `{{current_branch}}` != target_branch):
           options `Create <target_branch>` / `Switch to existing
           <target_branch>` (offer only if that branch already exists) /
           `Stay on {{current_branch}}` / Other. When the current branch
           already equals target_branch, OMIT this question entirely —
           you're already on the right branch.
        3. Base branch (ONLY when question 2 is shown): which base to
           branch off if creating — the repo's default branch first,
           then recent `release*` branches, then Other. Used only if the
           user picks `Create`.
        4. Session (always): "Rename this Claude Code session to
           `{{ticket_ref}}_ticket-plan` for /resume's picker?" options
           `Rename and continue` / `Provide my own label` / `Skip`.

      Then act on the answers:
        • Branch: on `Create`, refuse a dirty tree first
          (`git diff --quiet && git diff --cached --quiet` in
          `{{project.path}}`; if dirty, tell the user to stash/commit and
          `/wise-workflow-resume <run-ulid>`, then stop), branch off the
          chosen base, and `git checkout -b <target_branch>`. On `Switch`,
          `git checkout <target_branch>`. On `Stay`, do nothing.
          The branch name MUST equal target_branch exactly.
        • Session: on rename, print the exact `/rename <label>` command
          for the user to run in a separate message; on skip, do nothing.

      FINAL line MUST be exactly, on its own line:

        SETUP: branch=<branch-now-on> renamed=<yes|no|skipped>
    until: 'SETUP: branch=(\S+) renamed=(\S+)'
    outputs: [work_branch, session_renamed]
    depends_on: [review-comments, refine-plan]
    trigger-rule: all-done

  - id: finalize
    type: prompt
    prompt: |
      Print the closing summary:

        Ticket:  {{tracker_slug}}:{{ticket_ref}}
        Branch:  {{work_branch}}
        Plan:    {{plan_path}}

      Then tell the user their options:
        — Implement now:  /wise-implement-plan-auto {{plan_path}}
        — Save for later: the plan file persists in the run directory;
          resume this session from /resume's picker.

      For 3+ parallel tasks in a single wave, mention that
      `/wise-implement-plan-auto` runs each wave's tasks in parallel.
    depends_on: [setup]
