version: 1
name: pr-interactive
description: >-
  Guided PR workflow — takes a feature branch from "just pushed"
  to "ready for review". Detects whether a PR already exists on
  the branch, creates or refreshes it with a templated body
  (project template takes precedence, workflow fallback otherwise),
  then unconditionally enters the strategy-driven watch loop: lint
  auto-fix + commit; tests auto-fix + commit; "other" check
  classes via AskUserQuestion; then four reviewable queues
  (humans → Copilot → CodeRabbit → Sonar). Each queue offers
  Paged-bulk / Fix all / Walk step-by-step / Skip queue (humans
  drop Fix all) and runs a 4-phase apply after collection —
  collect every decision (no side effects), apply local edits
  with one commit (push=no), apply remote thread-resolves +
  replies + Sonar MCP status changes, then one `git push` at the
  end of the queue. Bot review queues use Fix-flavored option
  labels; Sonar keeps Accept (suppression is a distinct
  semantic). Exits when every check is green AND no actionable
  review items remain. Rejects cleanly on protected branches
  (main / master / release-*) when no PR yet exists. Reviewer
  attachment is intentionally OUTSIDE this workflow — use
  `/wise-pr-add-reviewers` when ready to request review. If you
  want just the PR created without the loop, use `/wise-pr-create`
  instead.
author: e1024kb

project-selection: current

# Pre-flight answers (control-mode / worktree / rename) are NOT
# pinned — the runner picks at pre-flight. There is NO "skip
# watch" option at pre-flight either; the watch loop always runs
# after ensure-pr because CI + sonar + bot-review comments are
# the whole point of pr-interactive. If you want a PR created
# without the loop, /wise-pr-create is the narrower skill for that.

steps:
  # ---- 1. detect current PR state ---------------------------------------
  #
  # Run `gh pr view` on the current branch; capture current branch
  # name; emit the five detect outputs in one `DETECT:` line that the
  # conductor extracts via the `until:` regex.
  - id: detect-pr
    type: prompt
    prompt: |
      Use the Bash tool to run these commands against the current
      working directory:

        BRANCH="$(git rev-parse --abbrev-ref HEAD)"
        echo "$BRANCH"
        gh pr list --head "$BRANCH" --state open --json number,baseRefName,url --limit 1 2>/dev/null || echo '[]'
        gh pr list --head "$BRANCH" --state closed --json number,state,url --limit 3 2>/dev/null || echo '[]'

      Filter by `--state open` explicitly: `gh pr view` happily
      returns closed/merged PRs when the branch has nothing open,
      and we don't want to refresh an already-merged or abandoned
      PR. The third command is informational only — it captures
      closed/merged PRs for a transparency note when no open PR
      exists, and never flips `exists` to yes.

      Parse the results:
        - `current_branch` is the first `echo` line, trimmed.
        - Parse the second command's output as a JSON array.
          Empty array → no open PR for this branch; otherwise
          take the first element and read `number` (stringified),
          `baseRefName`, and `url`.
        - Parse the third command's output as a JSON array of
          closed/merged PRs. If it's non-empty AND the open-PR
          array was empty, print a one-line informational note to
          chat naming the closed PR number(s) — e.g.
          `Found closed PR #1924 on this branch; drafting a new PR instead of refreshing it.`

      Fields to emit:
        - branch:   the current branch name
        - exists:   `yes` if an OPEN PR was found, else `no`
        - number:   the open PR number, or `NONE` when exists=no
        - base:     the open PR base (baseRefName), or `NONE`
        - url:      the open PR url, or `NONE`

      Reply with EXACTLY ONE line on its own as the FINAL line of your
      response, no surrounding prose, no markdown, no code fences, in
      this form:

        DETECT: branch=<branch> exists=<yes|no> number=<number-or-NONE> base=<base-or-NONE> url=<url-or-NONE>

      Example final lines:

        DETECT: branch=feat/PROJ-99 exists=yes number=142 base=main url=https://github.com/owner/repo/pull/142
        DETECT: branch=main exists=no number=NONE base=NONE url=NONE
    until: 'DETECT: branch=(\S+) exists=(yes|no) number=(\S+) base=(\S+) url=(\S+)'
    max_iterations: 2
    outputs: [current_branch, pr_exists, pr_number, pr_base, pr_url]
    depends_on: []

  # ---- 2. guard ---------------------------------------------------------
  #
  # A branch is "protected" if it matches main / master / release /
  # release-* / release/*. The guard REJECTS only when a protected
  # branch has no PR — creating a PR *from* main is almost always a
  # mistake. If a protected branch already has a PR, the workflow
  # continues and just refreshes body/reviewers.
  - id: guard
    type: prompt
    prompt: |
      Current branch: {{current_branch}}
      PR exists for this branch: {{pr_exists}}

      A branch is "protected" when it matches any of these patterns:

        ^main$
        ^master$
        ^release$
        ^release[/-]           (covers `release/26.5.0`, `release-26-5-0`,
                                `release/2025-11`, etc.)

      The guard rule:

        - protected AND pr_exists=no   → REJECT. Tell the user to
          check out a ticket-scoped branch first — named exactly the
          ticket key (e.g. `git checkout -b PROJ-777`, per
          references/branch-naming.md) — and re-run the workflow.
        - protected AND pr_exists=yes  → PASS. Assume the PR was
          created deliberately; the workflow will refresh body and
          reviewers but skip the creation path in later steps.
        - not protected                → PASS.

      If PASS, your FINAL line of output must be EXACTLY:

        GUARD: pass

      If REJECT, first write a one-paragraph explanation for the user
      that names the current branch, explains why creating a PR from
      a protected branch is blocked, and suggests the concrete
      recovery command. Then emit the FINAL line EXACTLY:

        GUARD: reject

      The final line is MANDATORY — the conductor uses it to gate
      downstream steps via `when:`.
    until: 'GUARD: (pass|reject)'
    max_iterations: 1
    outputs: [guard_verdict]
    depends_on: [detect-pr]

  # ---- 3. draft the PR body ---------------------------------------------
  #
  # Gathers git changes, resolves the PR template (project override →
  # workflow fallback), fills the template, writes the result to a
  # /tmp file, and records the path as `pr_body_path` so ensure-pr
  # can `gh pr create|edit --body-file <path>`.
  - id: draft-body
    type: prompt
    prompt: |
      Read the procedure at
      `{{workflow.dir}}/prompts/draft-body.md` via the Read tool
      and follow it. Runtime context:

        current_branch: {{current_branch}}
        pr_exists:      {{pr_exists}}
        pr_base:        {{pr_base}}
        project.path:   {{project.path}}
        workflow.dir:   {{workflow.dir}}

      Your response's FINAL line MUST match the form:

        DRAFT: body_path=<absolute-path>
    until: 'DRAFT: body_path=(\S+)'
    max_iterations: 2
    outputs: [pr_body_path]
    # Surface the drafted body inline in the wave-results render so
    # the user can review it before ensure-pr pushes it — they
    # shouldn't have to open the /tmp file to see what's about to be
    # sent to GitHub.
    surface:
      file: pr_body_path
      label: "Drafted PR body"
    when: "guard_verdict == 'pass'"
    depends_on: [guard]

  # ---- 4. create or refresh the PR --------------------------------------
  #
  # Existing PR → gh pr edit --body-file to refresh the body.
  # No PR → fetch up to 5 recent release branches, AskUserQuestion
  # for the base (main first, then release/*), gh pr create with the
  # drafted body. Overwrites `pr_number` / `pr_url` with the real
  # values coming back from gh.
  - id: ensure-pr
    type: prompt
    prompt: |
      Read the procedure at
      `{{workflow.dir}}/prompts/ensure-pr.md` via the Read tool and
      follow it. Runtime context:

        current_branch: {{current_branch}}
        pr_exists:      {{pr_exists}}
        pr_number:      {{pr_number}}
        pr_url:         {{pr_url}}
        pr_base:        {{pr_base}}
        pr_body_path:   {{pr_body_path}}
        project.path:   {{project.path}}
        workflow.dir:   {{workflow.dir}}

      Your response's FINAL line MUST match the form:

        PR-CREATE: number=<number> url=<url>
    until: 'PR-CREATE: number=(\S+) url=(\S+)'
    max_iterations: 2
    outputs: [pr_number, pr_url]
    when: "guard_verdict == 'pass'"
    depends_on: [draft-body]

  # ---- 5. watch-pipelines (always runs) --------------------------------
  #
  # Not opt-in. The whole point of pr-interactive is to take a PR
  # from "just created" to "ready for review" — lint + tests + sonar
  # + bot review comments (Copilot / CodeRabbit) all handled before
  # the run reports done. If you just want a PR created without the
  # check loop, use the `/wise-pr-create` standalone skill; pr-interactive
  # is the opinionated shape that owns the full pipeline dance.
  #
  # Long-running strategy loop: poll `gh pr checks --watch`; classify
  # failing checks by name; dispatch per class (lint → auto-fix +
  # commit-from-fix; sonar → interactive Fix/Accept/Skip wizard;
  # tests → auto-fix with escalation; other → AskUserQuestion); then
  # handle Copilot/CodeRabbit review comments via the handle-bot-reviews
  # fragment. Exits when CI is green AND no actionable review items
  # remain (or user abort / stuck-loop safety catch).
  # `type: interactive` is critical here — the fragment's per-item
  # wizards (sonar Fix/Accept/Skip, bot-review Fix/Accept/Dismiss/Skip)
  # rely on AskUserQuestion, which ONLY works in the conductor's
  # main conversation. A `type: prompt` step spawns a Task subagent
  # that can't call AskUserQuestion — the wizards would silently
  # degrade to "list the items and emit partial", which is exactly
  # what happened before 0.49.
  - id: watch-pipelines
    type: interactive
    prompt: |
      Read the procedure at
      `{{workflow.dir}}/prompts/watch-pipelines.md` via the Read
      tool and follow it. Runtime context:

        pr_number:      {{pr_number}}
        pr_url:         {{pr_url}}
        current_branch: {{current_branch}}
        project.path:   {{project.path}}
        workflow.dir:   {{workflow.dir}}

      Your response's FINAL line MUST match one of:

        WATCH: all-green url=<url>
        WATCH: aborted reason=<short-reason>
        WATCH: partial url=<url> accepted=<comma-separated-check-names>
    until: 'WATCH: (all-green|aborted|partial)'
    outputs: [watch_verdict]
    when: "guard_verdict == 'pass'"
    depends_on: [ensure-pr]

  # ---- 6. report --------------------------------------------------------
  #
  # Final summary.
  - id: report
    type: prompt
    prompt: |
      Summarise for the user what this run accomplished:

        - Current branch:       {{current_branch}}
        - PR exists (pre-run):  {{pr_exists}}
        - PR number:            {{pr_number}}
        - PR base:              {{pr_base}}
        - PR url:               {{pr_url}}
        - Guard verdict:        {{guard_verdict}}
        - Body source:          {{pr_body_path}}
        - Watch verdict:        {{watch_verdict}}

      If watch_verdict is `all-green`, congratulate the user —
      lint, tests, sonar, and bot-review comments all resolved.
      If `partial`, list the accepted checks + pending review items
      and remind the user they'll show on the PR. If `aborted`,
      note what stopped the loop and include the PR url.

      End the paragraph with a pointer at `/wise-pr-add-reviewers` —
      reviewer attachment is intentionally outside this workflow;
      the user runs it when they're ready to request review.

      One short paragraph, no markdown headings.
    when: "guard_verdict == 'pass'"
    depends_on: [watch-pipelines]
