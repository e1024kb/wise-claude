version: 1
name: ticket-auto
description: >-
  Autonomous ticket → PR pipeline. For each ticket given, a Lead
  Architect plus three Senior Engineers plan it, implement it in an
  isolated git worktree, commit, push, open a PR, request review, and
  watch + fix CI until the PR is green — end to end, with no user
  prompts. One worktree + branch + PR per ticket; a PR is merged once
  all its checks pass, otherwise left open for a human.
author: e1024kb

project-selection: current

# Default prompt steps to the wise SDLC agent roster. Most of this
# workflow's real work (plan / implement / review / fix) happens inside
# the `process-tickets` interactive fragment, which dispatches its own
# Lead-Architect / Senior-Engineer subagents — those map conceptually to
# wise:architect and wise:software-engineer. At the step level only
# `report` forces a role (wise:technical-writer); `assemble-team` opts
# out because it needs `TeamCreate`, a tool no scoped roster role carries.
agents: auto

# ticket-auto is fully autonomous: it never asks the user for consent,
# permission, or a decision. Every choice the interactive ticket-plan
# flow delegates to the user is made here by the Lead
# Architect agent instead.
#   control-mode: synchronous — no approval gates, no ask steps.
#   worktree: current — NOT `new`. Pre-flight `new` would give ONE
#     worktree for the whole run; this workflow needs one worktree PER
#     ticket, so the orchestrator creates them itself with
#     `git worktree add`. Pinning `current` keeps {{project.path}}
#     pointing at the real repo, the correct base for those.
#   rename_session: skip — an unattended run has nobody to read a
#     friendlier /resume label.
# There are NO `ask`, `approval`, or `interactive`-gate prompts that
# pause for a human — `process-tickets` is `type: interactive` only
# because it must run in the conductor (full Bash/Task access for the
# per-ticket loop), not because it asks anything.
preflight:
  control-mode:   synchronous
  worktree:       current
  rename_session: skip

inputs:
  - name: ticket_ids
    prompt: "Which tickets? Comma-separated list of URLs or ids (e.g. PROJ-1, PROJ-2, https://linear.app/acme/issue/ENG-9). When passing positionally on the command line, use NO spaces between items (PROJ-1,PROJ-2)."
  # Free-form operator guidance, threaded to the Lead Architect as
  # standing config for the whole run. As the LAST declared input it
  # absorbs the remainder of the command line, so it can be a full
  # sentence:
  #   /wise-workflow-run ticket-auto PROJ-1 prefer the design-system lib; never touch infra/*; cap CI fixes at 4
  # Optional — omit it and the run uses its max-value defaults. The
  # prompt does NOT switch the run to asking the user anything: the
  # Lead Architect predicts the answers to any question it implies and
  # keeps the max-value rule. It can also override tuning knobs (e.g.
  # the CI-fix cap, default 10).
  - name: config_prompt
    prompt: "Optional free-form guidance to tune this run — special skills/libraries to prefer, guidelines, guardrails, files to avoid, knob overrides (e.g. 'cap CI fixes at 4'). Blank = none."
    optional: true

steps:
  - id: assemble-team
    type: prompt
    prompt: |
      You are the conductor of an AUTONOMOUS ticket → PR run. Stand up
      the team that will carry every ticket in it.

      Use `TeamCreate` to assemble a team of four:

        • Lead Architect — 20+ years, the team leader and sole
          decision-maker. Owns every decision the interactive
          ticket-plan flow would ask a human for:
          how to resolve ticket ambiguity, the technical approach, the
          plan's scope and task breakdown, how to fix a failing check,
          whether a bot review comment should be applied. Pragmatic,
          decisive, writes the rationale down. When a choice has a
          performance / depth / thoroughness dial, the Architect takes
          the MAXIMUM-value option by default — this is an autonomous
          run; never settle for a middle default a human might have
          picked.

      Standing operator guidance for this run (may be empty):

        {{config_prompt}}

      The Lead Architect treats that guidance as binding configuration
      for EVERY decision below — preferred skills / libraries, coding
      guidelines, guardrails, files to stay out of, and any explicit
      knob override (e.g. a CI-fix cap). It never turns the run into a
      Q&A: where the guidance implies an answer the run would otherwise
      ask for, the Architect predicts that answer and proceeds (taking
      the max-value default, per above, for whatever it leaves open).
      Later steps receive this same `config_prompt` and apply it in
      their own context.
        • Three Senior Software Engineers — 20+ years each, polyglot:
          deeply experienced across every major programming language,
          framework, frontend, backend, infra, and tooling. They do
          the hands-on work — research, codebase audit, implementing
          plan tasks, fixing CI — and report to the Lead Architect.

      This team owns the whole run. Later steps dispatch work to its
      members. If team members cannot be kept resident across steps,
      treat the role names as personas applied to each step's
      subagents.

      Reply with a one-line confirmation naming the team and its four
      members.
    agent: off                  # needs TeamCreate — keep on general-purpose
    depends_on: []

  - id: split-tickets
    type: prompt
    prompt: |
      Parse the input `{{ticket_ids}}` into a clean list of ticket
      references: split on commas, trim each entry, drop empties.

      If the list is empty, stop and surface the error — there is
      nothing to process.

      Your response's FINAL line MUST be exactly, on its own line
      (join the tickets with semicolons, no spaces):

        TICKETS: count=<n> list=<ticket1;ticket2;...>
    until: 'TICKETS: count=(\d+) list=(\S.*)'
    max_iterations: 2
    outputs: [ticket_count, ticket_list]
    depends_on: [assemble-team]

  - id: preflight-checks
    type: bash
    command: |
      set -e
      cd "{{project.path}}"

      # An autonomous multi-worktree run must start from a clean base.
      if ! git diff --quiet || ! git diff --cached --quiet; then
        echo "ERROR: base repo at $(pwd) has uncommitted changes." >&2
        echo "Stash or commit them, then re-run /wise-workflow-run ticket-auto." >&2
        exit 1
      fi

      gh auth status >/dev/null 2>&1 || { echo "ERROR: gh is not authenticated; run 'gh auth login'." >&2; exit 1; }
      git remote get-url origin >/dev/null 2>&1 || { echo "ERROR: no 'origin' remote." >&2; exit 1; }
      echo "PREFLIGHT: ok"
    cwd: "{{project.path}}"
    success:
      exit_code: 0
      stdout_matches: "PREFLIGHT: ok"
    timeout: 30
    depends_on: [split-tickets]

  - id: process-tickets
    type: interactive
    prompt: |
      Read {{workflow.dir}}/prompts/process-tickets.md and follow it
      exactly. It is the per-ticket orchestrator: for each ticket it
      creates an isolated worktree and drives plan → implement → push
      → PR → request-review → watch+fix, fully autonomously.

      Runtime context:
        ticket_list:   {{ticket_list}}
        ticket_count:  {{ticket_count}}
        config_prompt: {{config_prompt}}
        project.path:  {{project.path}}
        project.name:  {{project.name}}
        project.kind:  {{project.kind}}
        workflow.dir:  {{workflow.dir}}

      `config_prompt` is the operator's standing guidance (may be
      empty) — pass it down to every per-ticket phase, and resolve the
      CI-fix cap (`max_fix_attempts`, default 10) from it when it names
      an override.

      Process tickets sequentially; one failing ticket never aborts
      the run. A fully green PR is merged by the watch step; any PR
      that is not fully green is left open for a human.

      Your response's FINAL line MUST match:

        TICKETS-DONE: processed=<N> merged=<M> open=<O> failed=<F>
    until: 'TICKETS-DONE: processed=(\d+) merged=(\d+) open=(\d+) failed=(\d+)'
    outputs: [tickets_processed, tickets_merged, tickets_open, tickets_failed]
    depends_on: [preflight-checks]

  - id: report
    type: prompt
    prompt: |
      Give the (absent) operator an end-of-run report. Use the
      per-ticket results table `process-tickets` printed. For each
      ticket list: the ticket ref, the branch, the worktree path, the
      PR url, and the verdict (merged / all-green / partial /
      exhausted / human-intervention / failed).

      Then a summary line: {{tickets_processed}} processed —
      {{tickets_merged}} merged, {{tickets_open}} open,
      {{tickets_failed}} failed.

      Call out explicitly which PRs were merged and which were left
      open for a human (anything not fully green); for each open PR
      say why. List the
      `git worktree remove <path>` command for each ticket worktree so
      the operator can clean up when done.
    agent: technical-writer
    depends_on: [process-tickets]
